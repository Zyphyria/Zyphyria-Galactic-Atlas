<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zyphyria — Solar System Atlas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sarabun:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--c:#00d4ff;--p:rgba(2,6,22,.95);--b:rgba(0,212,255,.15);--t:#c8e8ff;}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:'Sarabun',sans-serif;color:var(--t);}
#c{position:fixed;inset:0;z-index:1;cursor:crosshair;}
#c.drag{cursor:grabbing;}
#lc{position:fixed;inset:0;z-index:6;pointer-events:none;}
#wf{position:fixed;inset:0;z-index:50;pointer-events:none;opacity:0;transition:opacity .3s;background:radial-gradient(ellipse,rgba(60,140,255,.5),transparent 65%);}
/* LOADING */
#ld{position:fixed;inset:0;z-index:1000;background:#000008;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.5s;}
.logo{font-family:'Orbitron',monospace;font-size:clamp(1.4rem,4vw,2.8rem);font-weight:900;color:var(--c);letter-spacing:.22em;text-shadow:0 0 60px var(--c),0 0 120px #0044ff;animation:gl 2.5s infinite;text-align:center;line-height:1.4;}
.sub{font-size:.65rem;color:rgba(0,212,255,.3);letter-spacing:.5em;margin-top:.35rem;margin-bottom:3rem;}
@keyframes gl{0%,100%{text-shadow:0 0 40px var(--c),0 0 80px #0033ff}50%{text-shadow:0 0 120px var(--c),0 0 240px #0022ff}}
#lbar{width:280px;height:1px;background:rgba(0,212,255,.07);}
#lfill{height:100%;background:linear-gradient(90deg,#002299,var(--c));width:0%;transition:width .4s;box-shadow:0 0 8px var(--c);}
#lmsg{margin-top:.8rem;font-size:.6rem;color:rgba(0,212,255,.3);letter-spacing:.2em;}
/* UI */
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;}
#ui>*{pointer-events:auto;}
#nav{position:absolute;top:0;left:0;right:0;padding:.5rem .9rem;display:flex;align-items:center;gap:.4rem;background:linear-gradient(180deg,rgba(0,0,18,.97),transparent);flex-wrap:wrap;}
.brand{font-family:'Orbitron',monospace;font-size:.68rem;font-weight:700;color:var(--c);letter-spacing:.05em;flex-shrink:0;}
#sb{flex:1;min-width:120px;max-width:240px;position:relative;}
#si{width:100%;background:rgba(0,6,26,.88);border:1px solid var(--b);color:var(--t);padding:.26rem .65rem;font-family:'Sarabun',sans-serif;font-size:.7rem;border-radius:3px;outline:none;}
#si:focus{border-color:var(--c);}
#sd{position:absolute;top:calc(100%+3px);left:0;right:0;background:rgba(0,3,16,.99);border:1px solid var(--b);border-radius:3px;display:none;z-index:300;max-height:220px;overflow-y:auto;}
.si2{padding:.26rem .65rem;cursor:pointer;font-size:.68rem;border-bottom:1px solid rgba(0,212,255,.04);}
.si2:hover{background:rgba(0,212,255,.07);}
.stag{font-size:.56rem;color:var(--c);margin-left:.3rem;opacity:.65;}
.btn{background:rgba(0,6,26,.8);border:1px solid var(--b);color:var(--t);padding:.22rem .55rem;font-size:.64rem;font-family:'Sarabun',sans-serif;border-radius:3px;cursor:pointer;white-space:nowrap;transition:all .1s;}
.btn:hover,.btn.on{background:rgba(0,212,255,.11);border-color:rgba(0,212,255,.5);color:var(--c);}
/* INFO PANEL */
#ip{position:absolute;left:.9rem;top:3.4rem;width:272px;max-height:calc(100vh-4.5rem);overflow-y:auto;background:var(--p);border:1px solid var(--b);border-radius:8px;padding:.85rem;display:none;backdrop-filter:blur(28px);}
#ip::-webkit-scrollbar{width:2px;}#ip::-webkit-scrollbar-thumb{background:rgba(0,212,255,.18);}
#ip h2{font-family:'Orbitron',monospace;font-size:.82rem;color:var(--c);line-height:1.3;margin-bottom:.06rem;}
.ity{font-size:.56rem;color:#7b2fff;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.6rem;opacity:.9;}
.row{display:flex;justify-content:space-between;padding:.17rem 0;border-bottom:1px solid rgba(0,212,255,.04);font-size:.65rem;}
.lbl{color:rgba(200,232,255,.32);}
.val{color:var(--t);font-weight:600;font-size:.64rem;text-align:right;max-width:62%;}
.desc{margin-top:.5rem;font-size:.67rem;color:rgba(200,232,255,.62);line-height:1.72;}
.cbtn{position:absolute;top:.45rem;right:.55rem;background:none;border:none;color:rgba(0,212,255,.38);cursor:pointer;font-size:.72rem;}
.cbtn:hover{color:var(--c);}
/* HUD */
#hud{position:absolute;top:3.4rem;right:.9rem;background:var(--p);border:1px solid var(--b);border-radius:6px;padding:.46rem .7rem;font-size:.61rem;color:rgba(200,232,255,.45);line-height:2.1;backdrop-filter:blur(18px);}
#hud b{color:var(--c);}#spd{color:#ffd700;}
/* CROSSHAIR */
#xh{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:15;opacity:.25;}
#xh::before,#xh::after{content:'';position:absolute;background:var(--c);}
#xh::before{width:14px;height:1px;top:6px;left:0;}
#xh::after{width:1px;height:14px;top:0;left:6px;}
/* D-PAD */
#dp{position:absolute;bottom:5.6rem;left:.9rem;display:grid;grid-template-columns:repeat(3,33px);grid-template-rows:repeat(3,33px);gap:2px;}
.dk{background:rgba(0,5,20,.88);border:1px solid var(--b);color:var(--c);font-size:.68rem;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;}
.dk:active,.dk.on{background:rgba(0,212,255,.18);}
.dkb{background:transparent!important;border:none!important;cursor:default!important;}
/* TIME */
#tc{position:absolute;bottom:.6rem;left:50%;transform:translateX(-50%);background:var(--p);border:1px solid var(--b);border-radius:6px;padding:.35rem .7rem;display:flex;align-items:center;gap:.42rem;backdrop-filter:blur(18px);}
.td{font-family:'Orbitron',monospace;font-size:.6rem;color:var(--c);min-width:145px;text-align:center;}
.tb{background:rgba(0,5,20,.82);border:1px solid var(--b);color:var(--t);width:21px;height:21px;border-radius:3px;cursor:pointer;font-size:.63rem;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.tb:hover,.tb.on{background:rgba(0,212,255,.13);color:var(--c);border-color:rgba(0,212,255,.42);}
#sl{font-size:.6rem;color:#ffd700;min-width:28px;text-align:center;}
/* MINIMAP */
#mm{position:absolute;bottom:4.8rem;right:.9rem;width:112px;height:112px;background:rgba(0,1,6,.96);border:1px solid var(--b);border-radius:50%;overflow:hidden;}
#mmc{width:100%;height:100%;}
.mml{position:absolute;bottom:2px;width:100%;text-align:center;font-size:.46rem;color:rgba(0,212,255,.24);letter-spacing:.06em;}
/* BOTTOM RIGHT */
#br{position:absolute;bottom:.6rem;right:.9rem;display:flex;flex-direction:column;gap:.28rem;align-items:flex-end;}
/* NEAREST */
#nl{position:absolute;bottom:5.6rem;left:50%;transform:translateX(-50%);background:rgba(0,2,12,.9);border:1px solid rgba(0,212,255,.2);padding:.13rem .45rem;border-radius:3px;font-size:.61rem;color:var(--c);display:none;white-space:nowrap;}
/* ORBIT HINT */
#oh{position:absolute;bottom:5.6rem;right:.9rem;font-size:.54rem;color:rgba(0,212,255,.3);text-align:right;line-height:1.9;display:none;}
/* DIST */
#di{position:absolute;top:3.4rem;left:50%;transform:translateX(-50%);background:var(--p);border:1px solid var(--b);border-radius:4px;padding:.28rem .6rem;font-size:.58rem;color:rgba(200,232,255,.42);display:none;backdrop-filter:blur(12px);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="lc"></canvas>
<div id="wf"></div>
<div id="xh"></div>
<div id="ld">
  <div class="logo">ZYPHYRIA<br>SOLAR SYSTEM ATLAS</div>
  <div class="sub">ระบบสุริยะสมบูรณ์แบบ · v8</div>
  <div id="lbar"><div id="lfill"></div></div>
  <div id="lmsg">กำลังโหลด...</div>
</div>
<div id="ui">
  <div id="nav">
    <div class="brand">⬡ ZYPHYRIA SOLAR ATLAS</div>
    <div id="sb"><input id="si" type="text" placeholder="🔍 ค้นหาดาว, ดวงจันทร์..."><div id="sd"></div></div>
    <button class="btn on" id="bFr" onclick="setMode('free')">🚀 Free Fly</button>
    <button class="btn" id="bOr" onclick="setMode('orbit')">🌐 Orbit</button>
    <button class="btn" id="bCn" onclick="togCon()">✦ กลุ่มดาว</button>
    <button class="btn" id="bOb" onclick="togOrb()">○ วงโคจร</button>
    <button class="btn" onclick="shot()">📷</button>
  </div>
  <div id="ip">
    <button class="cbtn" onclick="closeIP()">✕</button>
    <h2 id="iN">—</h2><div class="ity" id="iT">—</div>
    <div id="iR"></div>
  </div>
  <div id="hud">
    <b>🚀 FREE FLY</b><br>
    <b>ลาก</b>เมาส์ = หมุนกล้อง<br>
    <b>W/S</b> = หน้า/หลัง · <b>A/D</b> = ซ้าย/ขวา<br>
    <b>Q/E</b> = ลง/ขึ้น · <b>Shift</b>=×5 <span id="spd"></span><br>
    <b>Scroll</b> = เร่ง/ถอย
  </div>
  <div id="dp">
    <div class="dkb dk"></div><div class="dk" id="dW">▲</div><div class="dk" id="dUp">↑</div>
    <div class="dk" id="dA">◀</div><div class="dk" id="dS">▼</div><div class="dk" id="dD">▶</div>
    <div class="dkb dk"></div><div class="dkb dk"></div><div class="dk" id="dDn">↓</div>
  </div>
  <div id="nl"></div>
  <div id="oh">🌐 Orbit Mode<br>ลาก=หมุน · Scroll=ซูม</div>
  <div id="di"></div>
  <div id="tc">
    <button class="tb" onclick="setSpd(-1)">⏮</button>
    <button class="tb" id="bP" onclick="togPause()">⏸</button>
    <button class="tb" onclick="setSpd(1)">▶</button>
    <button class="tb" onclick="setSpd(30)">⏩</button>
    <button class="tb" onclick="setSpd(365)">⏭</button>
    <div class="td" id="tD">—</div>
    <div id="sl">×1</div>
  </div>
  <div id="mm"><canvas id="mmc" width="112" height="112"></canvas><div class="mml">SOLAR SYSTEM</div></div>
  <div id="br">
    <button class="btn" onclick="resetCam()">☀ Reset</button>
    <button class="btn" id="bSd" onclick="togSnd()">🔊 Ambient</button>
  </div>
</div>

function mkProg(vs,fs){
  const p=gl.createProgram();
  [[gl.VERTEX_SHADER,vs],[gl.FRAGMENT_SHADER,fs]].forEach(([t,src])=>{
    const s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));
    gl.attachShader(p,s);
  });
  gl.linkProgram(p);return p;
}

`precision highp float;varying float vR;uniform float uIn,uOu;

function mkSph(st=56,sl=80){

  for(let i=0;i<=st;i++){const phi=Math.PI*i/st;for(let j=0;j<=sl;j++){const th=2*Math.PI*j/sl,x=Math.sin(phi)*Math.cos(th),y=Math.cos(phi),z=Math.sin(phi)*Math.sin(th);P.push(x,y,z);N.push(x,y,z);UV.push(j/sl,i/st);}}

function mkRing(ri,ro,s=200){

function showIP(obj){
  const d=obj.data,k=obj.kind;
  document.getElementById('iN').textContent=d.name+(d.en&&d.en!==d.name?' / '+d.en:'');
  document.getElementById('iT').textContent=d.type||'—';
  let rows=[];
  if(k==='moon')rows=[['เส้นผ่านศูนย์กลาง',d.dia],['ระยะห่างจากดาวแม่',d.dp],['คาบวงโคจร',d.op],['ค้นพบโดย',d.disc]];
  else rows=[['อุณหภูมิ',d.temp],['มวล',d.mass],['เส้นผ่านศูนย์กลาง',d.dia],['ระยะจากดวงอาทิตย์',d.ds],['คาบวงโคจร',d.op]];
  document.getElementById('iR').innerHTML=
    rows.filter(r=>r[1]).map(([l,v])=>`<div class="row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`).join('')+
    (d.desc?`<div class="desc">${d.desc}</div>`:'');
  document.getElementById('ip').style.display='block';
}
function closeIP(){document.getElementById('ip').style.display='none';}

// Search
const ALL=[
  ...PLANETS.map((d,i)=>({d,k:'planet',getPos:()=>pPos[i]})),
  ...DWARFS.map((d,i)=>({d,k:'dwarf',getPos:()=>dPos[i]})),
  ...MOONS.map((d,i)=>({d,k:'moon',getPos:()=>mPos[i]})),
];
document.getElementById('si').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim(),box=document.getElementById('sd');
  if(!q){box.style.display='none';return;}
  const mt=ALL.filter(o=>(o.d.name&&o.d.name.includes(q))||(o.d.en&&o.d.en.toLowerCase().includes(q)));
  if(!mt.length){box.style.display='none';return;}
  box.innerHTML=mt.slice(0,14).map(o=>`<div class="si2" onclick="pickObj(${ALL.indexOf(o)})">${o.d.name}<span class="stag">${o.d.en||''} · ${o.k}</span></div>`).join('');
  box.style.display='block';
});
document.addEventListener('click',e=>{if(!document.getElementById('sb').contains(e.target))document.getElementById('sd').style.display='none';});
function pickObj(idx){
  document.getElementById('sd').style.display='none';document.getElementById('si').value='';
  const o=ALL[idx];const pos=o.getPos().slice();
  showIP({kind:o.k,data:o.d,pos});warpTo(pos,o.d.r||.3);
}

// Nearest object detection
function updateNearest(){
  let best=null,bd=Infinity;
  const check=(p,data,k)=>{const d=len(s3(p,cam.pos));if(d<bd){bd=d;best={data,kind:k,pos:p.slice()};}};
  pPos.forEach((p,i)=>check(p,PLANETS[i],'planet'));
  dPos.forEach((p,i)=>check(p,DWARFS[i],'dwarf'));
  mPos.forEach((p,i)=>check(p,MOONS[i],'moon'));
  nearest=best;
  const nl=document.getElementById('nl');
  const r=best?.data?.r||.5;
  const thr=r*(mode==='free'?25:60);
  if(best&&bd<thr){nl.textContent=best.data.name+' — คลิกเพื่อดูข้อมูล';nl.style.display='block';}
  else nl.style.display='none';
}

// Minimap
const mmCtx=document.getElementById('mmc').getContext('2d');
function drawMM(){
  const MM=112;mmCtx.clearRect(0,0,MM,MM);
  mmCtx.fillStyle='rgba(0,1,5,.97)';mmCtx.fillRect(0,0,MM,MM);
  const cx=MM/2,cy=MM/2,camD=len(cam.pos);
  const view=Math.max(AU*1.5,Math.min(AU*60,camD*2.8));
  const sc=MM*.46/view;
  PLANETS.forEach(p=>{if(!p.d)return;mmCtx.strokeStyle='rgba(255,255,255,.05)';mmCtx.lineWidth=.5;mmCtx.beginPath();mmCtx.arc(cx,cy,p.d*sc,0,6.28);mmCtx.stroke();});
  // Sun
  mmCtx.fillStyle='#ffee88';mmCtx.shadowColor='#ffcc00';mmCtx.shadowBlur=5;mmCtx.beginPath();mmCtx.arc(cx,cy,3.5,0,6.28);mmCtx.fill();mmCtx.shadowBlur=0;
  // Planets
  pPos.forEach((p,i)=>{if(!i)return;const c=PLANETS[i].col;const px=Math.max(3,Math.min(MM-3,cx+p[0]*sc)),py=Math.max(3,Math.min(MM-3,cy+p[2]*sc));const r=Math.max(1.2,PLANETS[i].r*sc*20);mmCtx.fillStyle=`rgb(${c[0]*255|0},${c[1]*255|0},${c[2]*255|0})`;mmCtx.beginPath();mmCtx.arc(px,py,r,0,6.28);mmCtx.fill();});
  // Dwarfs
  dPos.forEach(p=>{const px=Math.max(2,Math.min(MM-2,cx+p[0]*sc)),py=Math.max(2,Math.min(MM-2,cy+p[2]*sc));mmCtx.fillStyle='rgba(180,155,130,.5)';mmCtx.beginPath();mmCtx.arc(px,py,.9,0,6.28);mmCtx.fill();});
  // Camera
  const f=fwd(),cpx=Math.max(3,Math.min(MM-3,cx+cam.pos[0]*sc)),cpy=Math.max(3,Math.min(MM-3,cy+cam.pos[2]*sc));
  mmCtx.fillStyle='#00d4ff';mmCtx.beginPath();mmCtx.arc(cpx,cpy,2.2,0,6.28);mmCtx.fill();
  mmCtx.strokeStyle='rgba(0,212,255,.6)';mmCtx.lineWidth=.9;mmCtx.beginPath();mmCtx.moveTo(cpx,cpy);mmCtx.lineTo(Math.max(2,Math.min(MM-2,cpx+f[0]*10)),Math.max(2,Math.min(MM-2,cpy+f[2]*10)));mmCtx.stroke();
}

// ── Draw Sphere ────────────────────────────────────
function drawSph(geo,mvp,M,pl,si){
  gl.useProgram(P_SPH);
  sa(P_SPH,'aP',geo.p,3);sa(P_SPH,'aN',geo.n,3);sa(P_SPH,'aUV',geo.uv,2);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,geo.idx);
  um4(P_SPH,'uMVP',mvp);um4(P_SPH,'uM',M);
  u3f(P_SPH,'uB',...pl.col);u3f(P_SPH,'uE',...(pl.em||[0,0,0]));
  u3f(P_SPH,'uSun',...pPos[0]);u3f(P_SPH,'uCam',...cam.pos);
  u1i(P_SPH,'uTy',pl.tt);u1f(P_SPH,'uT',gt);u1f(P_SPH,'uSp',pRot[si||0]);
  gl.drawElements(gl.TRIANGLES,geo.cnt,gl.UNSIGNED_SHORT,0);
}
function drawLine(buf,cnt,mvp,col,lt=gl.LINE_STRIP){
  gl.useProgram(P_LN);
  const la=gl.getAttribLocation(P_LN,'aP');gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.enableVertexAttribArray(la);gl.vertexAttribPointer(la,3,gl.FLOAT,false,0,0);
  um4(P_LN,'uMVP',mvp);u4f(P_LN,'uCol',...col);gl.drawArrays(lt,0,cnt);
}

// ── 2D Labels Canvas ───────────────────────────────
function drawLabels(VP){
  lctx.clearRect(0,0,lcvs.width,lcvs.height);
  // Planets
  PLANETS.forEach((p,i)=>{
    const sp=proj(pPos[i],VP);if(!sp)return;
    if(sp[0]<-30||sp[0]>innerWidth+30||sp[1]<-15||sp[1]>innerHeight+15)return;
    const d=len(s3(pPos[i],cam.pos));if(d>AU*14)return;
    const alpha=Math.min(1,(AU*14-d)/(AU*9));
    const yOff=Math.max(15,p.r*innerHeight/(d||1)*.55)+9;
    lctx.textAlign='center';
    lctx.font=`bold 11px Orbitron,monospace`;
    lctx.fillStyle=`rgba(255,255,255,${alpha*.72})`;
    lctx.fillText(p.name,sp[0],sp[1]+yOff);
    if(d<AU*5){
      lctx.font=`9px Sarabun,sans-serif`;
      lctx.fillStyle=`rgba(140,200,255,${alpha*.48})`;
      lctx.fillText(p.en,sp[0],sp[1]+yOff+12);
    }
  });
  // Dwarfs
  DWARFS.forEach((d,i)=>{
    const sp=proj(dPos[i],VP);if(!sp)return;
    if(sp[0]<0||sp[0]>innerWidth||sp[1]<0||sp[1]>innerHeight)return;
    const dist=len(s3(dPos[i],cam.pos));if(dist>AU*10)return;
    const alpha=Math.min(1,(AU*10-dist)/(AU*6));
    lctx.font=`9px Orbitron,monospace`;lctx.textAlign='center';
    lctx.fillStyle=`rgba(200,175,140,${alpha*.6})`;
    lctx.fillText(d.name,sp[0],sp[1]+12);
  });
  // Moons
  MOONS.forEach((m,i)=>{
    const sp=proj(mPos[i],VP);if(!sp)return;
    if(sp[0]<0||sp[0]>innerWidth||sp[1]<0||sp[1]>innerHeight)return;
    const dist=len(s3(mPos[i],cam.pos));if(dist>AU*1.2)return;
    const alpha=Math.min(1,(AU*1.2-dist)/(AU*.7));
    lctx.font=`8px Sarabun,sans-serif`;lctx.textAlign='center';
    lctx.fillStyle=`rgba(180,205,225,${alpha*.65})`;
    lctx.fillText(m.name,sp[0],sp[1]+8);
  });
  // Constellations
  if(conVis){
    CONS.forEach(c=>{
      const a=c.cx*(Math.PI/12),e=c.cy*(Math.PI/180),R=690;
      const wp=[R*Math.cos(e)*Math.cos(a),R*Math.sin(e),R*Math.cos(e)*Math.sin(a)];
      const sp=proj(wp,VP);if(!sp)return;
      if(sp[0]<-20||sp[0]>innerWidth+20||sp[1]<-10||sp[1]>innerHeight+10)return;
      lctx.textAlign='center';
      lctx.font=`bold 11px Orbitron,monospace`;
      lctx.fillStyle='rgba(255,255,255,.72)';lctx.fillText(c.n,sp[0],sp[1]);
      lctx.font=`9px Orbitron,monospace`;
      lctx.fillStyle='rgba(150,200,255,.4)';lctx.fillText(c.en,sp[0],sp[1]+12);
    });
  }
  // Distance indicator
  const d=len(cam.pos);
  const di=document.getElementById('di');
  if(d>AU*6){di.style.display='block';di.textContent=`ระยะทาง: ${(d/AU).toFixed(1)} AU จากดวงอาทิตย์`;}
  else di.style.display='none';
}

// ── Main Render Loop ───────────────────────────────
function loop(now=0){
  requestAnimationFrame(loop);
  const dt=Math.min((now-lastT)/1000,.05);lastT=now;
  const sdt=paused?0:dt*tSpd;
  if(!paused)simT+=sdt*86400000;
  gt+=dt;

  // Orbital mechanics
  const plTilts=[0,.10,.05,0,.025,.018,.036,.008,.025];
  PLANETS.forEach((p,i)=>{
    pRot[i]+=p.rot*dt*80;
    if(!p.d){pPos[i]=[0,0,0];return;}
    pAng[i]+=p.spd*sdt*.0012;
    pPos[i]=[p.d*Math.cos(pAng[i]),p.d*Math.sin(plTilts[i]||0)*.14,p.d*Math.sin(pAng[i])];
  });
  DWARFS.forEach((d,i)=>{
    dRot[i]+=.001*dt;dAng[i]+=d.spd*sdt*.0008;
    const tilt=i===7?.5:.08;
    dPos[i]=[d.d*Math.cos(dAng[i]),d.d*Math.sin(tilt)*.15,d.d*Math.sin(dAng[i])];
  });
  MOONS.forEach((m,i)=>{
    const dir=m.os<0?-1:1;mAng[i]+=Math.abs(m.os)*sdt*.001*dir;
    let pp;
    if(m.pi>=0)pp=pPos[m.pi];
    else{const di=DWARFS.findIndex(d=>d.id===m.pref);pp=di>=0?dPos[di]:[0,0,0];}
    mPos[i]=[pp[0]+m.or*Math.cos(mAng[i]),pp[1]+m.or*.02*Math.sin(mAng[i]*2.3),pp[2]+m.or*Math.sin(mAng[i])];
  });

  // Camera movement
  if(mode==='free'){
    const boost=(K.ShiftLeft||K.ShiftRight)?5:1,sp=.32*boost;
    const f=fwd(),r=rgt();let mv=[0,0,0];
    if(K.KeyW||K.ArrowUp)mv=a3(mv,sc3(f,sp));if(K.KeyS||K.ArrowDown)mv=a3(mv,sc3(f,-sp));
    if(K.KeyA||K.ArrowLeft)mv=a3(mv,sc3(r,-sp));if(K.KeyD||K.ArrowRight)mv=a3(mv,sc3(r,sp));
    if(K.KeyE)mv[1]+=sp;if(K.KeyQ)mv[1]-=sp;
    vel=[vel[0]*.82+mv[0]*.18,vel[1]*.82+mv[1]*.18,vel[2]*.82+mv[2]*.18];
    cam.pos=a3(cam.pos,vel);
  }else vel=[0,0,0];

  updateNearest();
  const V=viewMat(),P=projMat(),VP=mul4(P,V);

  // ── WebGL Render ──────────────────────────────────
  gl.clearColor(0,0,.005,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);gl.depthFunc(gl.LEQUAL);
  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);

  // Background stars (no depth test)
  gl.disable(gl.DEPTH_TEST);
  gl.useProgram(P_STR);
  sa(P_STR,'aP',GEO.sf.p,3);sa(P_STR,'aBr',GEO.sf.br,1);sa(P_STR,'aSz',GEO.sf.sz,1);sa(P_STR,'aC',GEO.sf.col,3);
  um4(P_STR,'uVP',VP);gl.drawArrays(gl.POINTS,0,GEO.sf.cnt);

  // Oort cloud (very faint)
  gl.useProgram(P_PT);
  sa(P_PT,'aP',GEO.ort.p,3);sa(P_PT,'aBr',GEO.ort.br,1);
  um4(P_PT,'uVP',VP);gl.drawArrays(gl.POINTS,0,GEO.ort.cnt);
  gl.enable(gl.DEPTH_TEST);

  // Kuiper Belt
  gl.useProgram(P_PT);
  sa(P_PT,'aP',GEO.kbt.p,3);sa(P_PT,'aBr',GEO.kbt.br,1);
  um4(P_PT,'uVP',VP);gl.drawArrays(gl.POINTS,0,GEO.kbt.cnt);

  // Asteroid Belt
  sa(P_PT,'aP',GEO.ast.p,3);sa(P_PT,'aBr',GEO.ast.br,1);
  um4(P_PT,'uVP',VP);gl.drawArrays(gl.POINTS,0,GEO.ast.cnt);

  // Orbit lines (white)
  if(orbVis){
    PLANETS.forEach((p,i)=>{if(!GEO.orbs[i])return;drawLine(GEO.orbs[i].b,GEO.orbs[i].cnt,VP,[1,1,1,.11]);});
    DWARFS.forEach((d,i)=>{drawLine(GEO.dorbs[i].b,GEO.dorbs[i].cnt,VP,[1,.85,.6,.07]);});
    MOONS.forEach((m,i)=>{
      const pp=m.pi>=0?pPos[m.pi]:dPos[DWARFS.findIndex(d=>d.id===m.pref)||0];
      drawLine(GEO.morbs[i].b,GEO.morbs[i].cnt,mul4(VP,T4(pp[0],pp[1],pp[2])),[1,1,1,.07]);
    });
  }

  // Constellation lines (white)
  if(conVis){
    gl.disable(gl.DEPTH_TEST);
    drawLine(GEO.cons.b,GEO.cons.cnt,VP,[1,1,1,.28],gl.LINES);
    gl.enable(gl.DEPTH_TEST);
  }

  // Dwarf planets
  DWARFS.forEach((d,i)=>{
    const[px,py,pz]=dPos[i];const M=mul4(T4(px,py,pz),Sc4(d.r));
    drawSph(GEO.sm,mul4(VP,M),M,{...d,em:[0,0,0]},0);
  });

  // Moons (use sm or tiny based on distance)
  MOONS.forEach((m,i)=>{
    const[mx,my,mz]=mPos[i];const M=mul4(T4(mx,my,mz),Sc4(m.r));
    const distToMoon=len(s3(mPos[i],cam.pos));
    const geo=distToMoon>AU*3?GEO.sm:GEO.md;
    drawSph(geo,mul4(VP,M),M,{...m,em:[0,0,0]},0);
  });

  // Planets
  PLANETS.forEach((p,i)=>{
    const[px,py,pz]=pPos[i];
    const M=mul4(mul4(T4(px,py,pz),RY(pRot[i])),Sc4(p.r));
    drawSph(GEO.lg,mul4(VP,M),M,p,i);
    // Saturn rings
    if(p.ring){
      gl.disable(gl.DEPTH_TEST);
      gl.useProgram(P_RNG);
      const RM=mul4(T4(px,py,pz),RX(.44));
      um4(P_RNG,'uMVP',mul4(VP,RM));
      u1f(P_RNG,'uIn',p.r*1.38);u1f(P_RNG,'uOu',p.r*2.74);
      const la=gl.getAttribLocation(P_RNG,'aP');
      gl.bindBuffer(gl.ARRAY_BUFFER,GEO.ring.p);gl.enableVertexAttribArray(la);gl.vertexAttribPointer(la,3,gl.FLOAT,false,0,0);
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,GEO.ring.idx);
      gl.drawElements(gl.TRIANGLES,GEO.ring.cnt,gl.UNSIGNED_SHORT,0);
      gl.enable(gl.DEPTH_TEST);
    }
  });

  // Time display
  const dt2=new Date(simT);
  document.getElementById('tD').textContent=
    `${dt2.getFullYear()}.${String(dt2.getMonth()+1).padStart(2,'0')}.${String(dt2.getDate()).padStart(2,'0')}${paused?' ⏸':''}`;

  drawLabels(VP);
  drawMM();
}

setMode('free');

  'กำลังสร้างดวงอาทิตย์...',
  'คำนวณวงโคจร 9 ดาวเคราะห์...',
  'โหลดดาวบริวาร 60+ ดวง...',
  'สร้างแถบดาวเคราะห์น้อย (2,200 จุด)...',
  'สร้างแถบไคเปอร์ (1,400 จุด)...',
  'สร้างเมฆออร์ต (700 จุด)...',
  'Render texture ดาวเคราะห์ทั้งหมด...',
  'เปิดแผนที่ระบบสุริยะ 🚀',
];
let li=0;const lf=document.getElementById('lfill'),lm=document.getElementById('lmsg');
(function tick(){
  lf.style.width=((li+1)/msgs.length*96)+'%';
  lm.textContent=msgs[Math.min(li,msgs.length-1)];
  li++;
  if(li>=msgs.length){
    setTimeout(()=>{
      document.getElementById('ld').style.opacity='0';
      setTimeout(()=>{document.getElementById('ld').style.display='none';requestAnimationFrame(loop);},1500);
    },500);
  }else setTimeout(tick,380);
})();
